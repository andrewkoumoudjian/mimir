name: Deploy dashboard to Vultr

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-vultr.yml"
      - "mimir/**"
      - "valsoft/**"
  workflow_dispatch:

concurrency:
  group: vultr-dashboard-production
  cancel-in-progress: true

env:
  VULTR_HOST: ${{ vars.VULTR_HOST || '173.199.93.71' }}
  VULTR_USER: ${{ vars.VULTR_USER || 'root' }}
  REMOTE_SRC_DIR: /opt/mimir-src
  REMOTE_VALSOFT_DIR: /opt/mimir/valsoft
  PUBLIC_URL: ${{ vars.NEXT_PUBLIC_URL || 'http://173.199.93.71' }}
  API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://173.199.93.71' }}
  MIMIR_API_URL: ${{ vars.NEXT_PUBLIC_MIMIR_API_URL || 'http://173.199.93.71:8787' }}

jobs:
  deploy:
    name: Sync, remote build, and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.VULTR_SSH_PRIVATE_KEY }}" || {
            echo "Missing GitHub secret VULTR_SSH_PRIVATE_KEY"
            exit 1
          }

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VULTR_SSH_PRIVATE_KEY }}" > ~/.ssh/vultr_deploy_key
          chmod 600 ~/.ssh/vultr_deploy_key
          ssh-keyscan -H "$VULTR_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to Vultr
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.turbo' \
            --exclude '.playwright-cli' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'output/playwright' \
            -e "ssh -i ~/.ssh/vultr_deploy_key" \
            mimir/ "$VULTR_USER@$VULTR_HOST:$REMOTE_SRC_DIR/"
          ssh -i ~/.ssh/vultr_deploy_key "$VULTR_USER@$VULTR_HOST" "mkdir -p '$REMOTE_VALSOFT_DIR/data' '$REMOTE_VALSOFT_DIR/output'"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/vultr_deploy_key" \
            valsoft/data/ "$VULTR_USER@$VULTR_HOST:$REMOTE_VALSOFT_DIR/data/"

      - name: Upload runtime env from secret
        env:
          DASHBOARD_ENV_FILE: ${{ secrets.DASHBOARD_ENV_FILE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "$DASHBOARD_ENV_FILE" ]; then
            printf '%s\n' "$DASHBOARD_ENV_FILE" > /tmp/dashboard.env
            scp -i ~/.ssh/vultr_deploy_key /tmp/dashboard.env "$VULTR_USER@$VULTR_HOST:/tmp/dashboard.env"
            ssh -i ~/.ssh/vultr_deploy_key "$VULTR_USER@$VULTR_HOST" 'mkdir -p /opt/mimir && install -m 600 /tmp/dashboard.env /opt/mimir/dashboard.env'
          else
            echo "DASHBOARD_ENV_FILE not configured; server will keep or create /opt/mimir/dashboard.env"
          fi

          if [ -n "$OPENROUTER_API_KEY" ]; then
            printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY" > /tmp/openrouter.env
            scp -i ~/.ssh/vultr_deploy_key /tmp/openrouter.env "$VULTR_USER@$VULTR_HOST:/tmp/openrouter.env"
            ssh -i ~/.ssh/vultr_deploy_key "$VULTR_USER@$VULTR_HOST" '
              mkdir -p /opt/mimir
              touch /opt/mimir/dashboard.env
              chmod 600 /opt/mimir/dashboard.env
              grep -v "^OPENROUTER_API_KEY=" /opt/mimir/dashboard.env > /tmp/dashboard.env.without_openrouter || true
              cat /tmp/dashboard.env.without_openrouter /tmp/openrouter.env > /tmp/dashboard.env.new
              install -m 600 /tmp/dashboard.env.new /opt/mimir/dashboard.env
              rm -f /tmp/openrouter.env /tmp/dashboard.env.without_openrouter /tmp/dashboard.env.new
            '
          else
            echo "OPENROUTER_API_KEY not configured; chatbot API will return a configuration error"
          fi

      - name: Remote build and deploy on Vultr
        env:
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        run: |
          if [ -z "$NEXT_SERVER_ACTIONS_ENCRYPTION_KEY" ]; then
            NEXT_SERVER_ACTIONS_ENCRYPTION_KEY="$(openssl rand -base64 32)"
          fi

          ssh -i ~/.ssh/vultr_deploy_key "$VULTR_USER@$VULTR_HOST" \
            "chmod +x '$REMOTE_SRC_DIR/deploy/vultr/build-and-deploy-dashboard.sh' && \
             SRC_DIR='$REMOTE_SRC_DIR' \
             VALSOFT_DIR='$REMOTE_VALSOFT_DIR' \
             IMAGE_TAG='mimir-dashboard:$GITHUB_SHA' \
             API_IMAGE_TAG='mimir-api:$GITHUB_SHA' \
             GITHUB_SHA='$GITHUB_SHA' \
             PUBLIC_URL='$PUBLIC_URL' \
             API_URL='$API_URL' \
             MIMIR_API_URL='$MIMIR_API_URL' \
             NEXT_SERVER_ACTIONS_ENCRYPTION_KEY='$NEXT_SERVER_ACTIONS_ENCRYPTION_KEY' \
             NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}' \
             NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}' \
             NEXT_PUBLIC_SUPABASE_ID='${{ secrets.NEXT_PUBLIC_SUPABASE_ID || 'local' }}' \
             NEXT_PUBLIC_OPENPANEL_CLIENT_ID='${{ secrets.NEXT_PUBLIC_OPENPANEL_CLIENT_ID }}' \
             NEXT_PUBLIC_SENTRY_DSN='${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}' \
             NEXT_PUBLIC_PLAID_ENVIRONMENT='${{ vars.NEXT_PUBLIC_PLAID_ENVIRONMENT || 'sandbox' }}' \
             NEXT_PUBLIC_TELLER_APPLICATION_ID='${{ secrets.NEXT_PUBLIC_TELLER_APPLICATION_ID }}' \
             NEXT_PUBLIC_TELLER_ENVIRONMENT='${{ vars.NEXT_PUBLIC_TELLER_ENVIRONMENT || 'sandbox' }}' \
             NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY='${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}' \
             NEXT_PUBLIC_GOOGLE_API_KEY='${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}' \
             NEXT_PUBLIC_DESKTOP_SCHEME='${{ vars.NEXT_PUBLIC_DESKTOP_SCHEME || 'midday' }}' \
             NEXT_PUBLIC_WHATSAPP_NUMBER='${{ vars.NEXT_PUBLIC_WHATSAPP_NUMBER }}' \
             NEXT_PUBLIC_TELEGRAM_BOT_USERNAME='${{ vars.NEXT_PUBLIC_TELEGRAM_BOT_USERNAME }}' \
             NEXT_PUBLIC_SENDBLUE_NUMBER='${{ vars.NEXT_PUBLIC_SENDBLUE_NUMBER }}' \
             SENTRY_AUTH_TOKEN='${{ secrets.SENTRY_AUTH_TOKEN }}' \
             SENTRY_ORG='${{ vars.SENTRY_ORG }}' \
             SENTRY_PROJECT='${{ vars.SENTRY_PROJECT }}' \
             '$REMOTE_SRC_DIR/deploy/vultr/build-and-deploy-dashboard.sh'"
