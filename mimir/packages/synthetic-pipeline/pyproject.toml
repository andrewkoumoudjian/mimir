[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "synthetic-pipeline"
version = "0.1.0"
description = "Rust-backed synthetic transaction generator for Mimir."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "maturin>=1.7,<2"]

[tool.maturin]
features = ["extension-module"]
module-name = "synthetic_pipeline._native"
python-source = "python"
