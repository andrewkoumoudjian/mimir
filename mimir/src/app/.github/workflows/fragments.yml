name: Fragments Governance
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  fragments-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Run Fragments check
        run: |
          mkdir -p .fragments
          if [ -n "$FRAGMENTS_BASE_REF" ]; then
            npx -y -p @fragments-sdk/cli fragments check --changed "origin/$FRAGMENTS_BASE_REF" --preset universal --format summary --report .fragments/governance.json --sarif .fragments/governance.sarif
          else
            npx -y -p @fragments-sdk/cli fragments check --preset universal --format summary --report .fragments/governance.json --sarif .fragments/governance.sarif
          fi
        env:
          FRAGMENTS_API_KEY: ${{ secrets.FRAGMENTS_API_KEY }}
          FRAGMENTS_CLOUD_URL: ${{ secrets.FRAGMENTS_CLOUD_URL }}
          FRAGMENTS_BASE_REF: ${{ github.base_ref }}

      - uses: actions/upload-sarif@v3
        if: always()
        with:
          sarif_file: .fragments/governance.sarif
